name: Set Issue Type and Date Created

on:
  issues:
    types: [opened]

jobs:
  set-project-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Set Type and Date Created based on title prefix
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.JOURNEY_UNBOUND_PROJECT_AUTOMATION }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toUpperCase().replace(/\[([^\]]+)\]:/g, "[$1]");

            // Map title prefixes to Type field values
            const prefixToType = {
              '[DESIGN]':        'Design',
              '[DOCS]':          'Documentation',
              '[DOCUMENTATION]': 'Documentation',
              '[QUESTION]':      'Question',
              '[ENHANCEMENT]':   'Enhancement',
              '[FEATURE]':       'Feature',
              '[BUG]':           'Bug',
              '[ACCESSIBILITY]': 'Accessibility',
              '[SECURITY]':      'Security',
              '[RELEASE]':       'Release',
              '[TESTING]':       'Testing',
              '[BRAIN DUMP]':    'Brain Dump',
            };

            const matchedPrefix = Object.keys(prefixToType).find(p => title.startsWith(p));
            const targetType = matchedPrefix ? prefixToType[matchedPrefix] : null;

            // Get the project
            const projectQuery = await github.graphql(`
              query {
                user(login: "JourneyUnbound") {
                  projectV2(number: 1) {
                    id
                    fields(first: 30) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                        ... on ProjectV2NumberField {
                          id
                          name
                        }
                        ... on ProjectV2TextFieldCommon {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = projectQuery.user.projectV2;
            const fields = project.fields.nodes;

            // Debug: log all fields
            console.log('All fields:', JSON.stringify(fields.map(f => ({ name: f.name, id: f.id }))));

            const typeField = fields.find(f => f.name === 'Type');
            const typeOption = targetType ? typeField?.options?.find(o => o.name === targetType) : null;
            const dateField = fields.find(f => f.name === 'Date Created');

            console.log('Date Created field:', JSON.stringify(dateField));
            console.log('Type field:', JSON.stringify(typeField));
            console.log('Target type:', targetType);

            // Retry loop — wait for issue to be added to project
            let projectItem = null;
            for (let i = 0; i < 6; i++) {
              await new Promise(resolve => setTimeout(resolve, 5000));
              const itemQuery = await github.graphql(`
                query($issueId: ID!) {
                  node(id: $issueId) {
                    ... on Issue {
                      projectItems(first: 10) {
                        nodes {
                          id
                          project { id }
                        }
                      }
                    }
                  }
                }
              `, { issueId: issue.node_id });
              projectItem = itemQuery.node.projectItems.nodes
                .find(item => item.project.id === project.id);
              if (projectItem) {
                console.log(`✅ Found project item after ${(i+1)*5} seconds`);
                break;
              }
              console.log(`Attempt ${i+1}: not in project yet, retrying...`);
            }

            if (!projectItem) {
              console.log('Issue not added to project after 30 seconds — skipping.');
              return;
            }

            // Set Type
            if (typeField && typeOption) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: typeField.id,
                optionId: typeOption.id
              });
              console.log(`✅ Type set to: ${targetType}`);
            }

            // Set Date Created
            if (dateField) {
              const today = new Date().toISOString().split('T')[0];
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: dateField.id,
                date: today
              });
              console.log(`✅ Date Created set to: ${today}`);
            } else {
              console.log('Date Created field not found!');
            }
