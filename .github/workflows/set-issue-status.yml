name: Set Issue Status and Date Created

on:
  issues:
    types: [opened, labeled]

jobs:
  set-project-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Set Status and Date Created based on TP label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.JOURNEY_UNBOUND_PROJECT_AUTOMATION }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Map TP: labels to Status field values
            const labelToStatus = {
              'TP: Design':        'Design',
              'TP: Documentation': 'Documentation',
              'TP: Question':      'Question',
              'TP: Enhancement':   'Enhancement',
              'TP: Feature':       'Feature',
              'TP: Bug':           'Bug',
              'TP: Accessibility': 'Accessibility',
              'TP: Security':      'Security',
              'TP: Release':       'Release',
              'TP: Testing':       'Testing',
              'TP: Brain Dump':    'Brain Dump',
            };

            // Find which TP: label is on this issue
            const matchedLabel = Object.keys(labelToStatus).find(l => labels.includes(l));
            const targetStatus = matchedLabel ? labelToStatus[matchedLabel] : 'Brain Dump';

            // Get the project
            const projectQuery = await github.graphql(`
              query {
                user(login: "JourneyUnbound") {
                  projectV2(number: 1) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                        ... on ProjectV2Field {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = projectQuery.user.projectV2;
            const fields = project.fields.nodes;

            // Find Status field and target option
            const statusField = fields.find(f => f.name === 'Status');
            const statusOption = statusField?.options?.find(o => o.name === targetStatus);

            // Find Date Created field
            const dateField = fields.find(f => f.name === 'Date Created');

            // Get the project item for this issue
            const itemQuery = await github.graphql(`
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `, { issueId: issue.node_id });

            const projectItem = itemQuery.node.projectItems.nodes
              .find(item => item.project.id === project.id);

            if (!projectItem) {
              console.log('Issue not yet added to project — skipping.');
              return;
            }

            // Set Status
            if (statusField && statusOption) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: statusField.id,
                optionId: statusOption.id
              });
              console.log(`✅ Status set to: ${targetStatus}`);
            }

            // Set Date Created to today
            if (dateField) {
              const today = new Date().toISOString().split('T')[0];
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { date: $date }
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: dateField.id,
                date: today
              });
              console.log(`✅ Date Created set to: ${today}`);
            }
